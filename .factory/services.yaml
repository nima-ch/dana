commands:
  install: cd app/backend && bun install
  test: cd app/backend && bun test
  test-external: cd app/backend && bun test tests/externalTools.test.ts
  build: cd app/frontend && bun run build

services:
  dana:
    start: docker compose up -d dana
    stop: docker compose down dana
    healthcheck: curl -sf http://localhost:3000
    port: 3000
    depends_on: [searxng]

  searxng:
    start: docker compose up -d searxng
    stop: docker compose down searxng
    healthcheck: curl -sf http://localhost:8080
    port: 8080
    depends_on: []

  cli-proxy-api:
    start: docker compose up -d cli-proxy-api 2>/dev/null || echo "standalone"
    stop: docker stop cli-proxy-api
    healthcheck: curl -sf http://localhost:8317
    port: 8317
    depends_on: []
