services:
  dana:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SEARXNG_URL: http://searxng:8080
    ports:
      - "3000:3000"
      - "54545:54545"
      - "1455:1455"
    volumes:
      - ./data:/data
    depends_on:
      searxng:
        condition: service_started
    networks:
      - dana-net

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    networks:
      - dana-net

networks:
  dana-net:
    driver: bridge
